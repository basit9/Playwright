name: Playwright Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository. This has 3 steps (Pre, Main, Post) )
      - uses: actions/checkout@v4
      # Set up Node.js 20, install dependencies, install Playwright browsers, and run tests.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Install dependencies, install Playwright browsers, and run tests.
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test
      # Upload the Playwright report as an artifact if the tests were not cancelled.
      # This is more of a general action, to move stuff from VM before it gets destroyed.
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30